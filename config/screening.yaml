# Screening agent hard filters
# Edit this file to change what gets screened in/out without touching code.

# Acceptable location strings — case-insensitive substring match against the JD location field.
# A job passes if any of these appear in its location (or if no location is listed).
location_ok:
  - Remote
  - Hybrid
  - San Francisco
  - SF
  - Bay Area
  - San Jose
  - Oakland
  - Palo Alto
  - Mountain View
  - Menlo Park
  - Sunnyvale
  - Santa Clara
  - Redwood City
  - South Bay

# Minimum seniority level to screen in.
# Options: junior, mid, senior, staff, principal, director
min_seniority: mid

# Minimum compensation (annual, USD). Leave as null to skip the check.
# Only applied when the JD explicitly states compensation.
comp_floor: null

# Keywords that are automatic dealbreakers regardless of LLM verdict.
# Case-insensitive substring match against the full JD text.
dealbreaker_keywords:
  - "Top Secret clearance"
  - "TS/SCI"
  - "security clearance required"
  - "active clearance"

# Staffing / recruiting agency detection.
# Set flag_staffing: true to screen out roles posted by staffing companies.
# Matches against company name AND JD text (signals like "W2", "C2C", "contract role").
flag_staffing: true

# Known staffing/recruiting firm name fragments (case-insensitive, matched against company name).
staffing_company_names:
  - Randstad
  - Robert Half
  - Hays
  - Kforce
  - TEKsystems
  - Insight Global
  - Apex Systems
  - Modis
  - Staffmark
  - Aerotek
  - Kelly Services
  - ManpowerGroup
  - Manpower
  - Adecco
  - Volt
  - Talentify
  - CyberCoders
  - Motion Recruitment
  - Hired
  - Jobot
  - Dice
  - Experis
  - Infosys BPM
  - Wipro
  - HCL
  - Cognizant Staffing
  - Mastech
  - iGate
  - Collabera
  - Yoh
  - Staffing Solutions
  - Staffing Group
  - Recruiting Solutions
  - Talent Solutions

# JD text signals that suggest a staffing posting (case-insensitive substring match).
staffing_jd_signals:
  - "W2 only"
  - "W-2 only"
  - "C2C"
  - "corp to corp"
  - "contract to hire"
  - "contract role"
  - "contract position"
  - "staffing agency"
  - "our client is"
  - "on behalf of our client"
  - "placed at our client"
  - "recruiting firm"
  - "right to represent"
